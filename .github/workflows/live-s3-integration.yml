name: Live S3 Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * 1"

jobs:
  live-s3-integration:
    if: ${{ secrets.TAX_ASSISTANT_LIVE_S3_BUCKET != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run live S3 integration test
        env:
          RUN_LIVE_S3_TESTS: "1"
          TAX_ASSISTANT_LIVE_S3_BUCKET: ${{ secrets.TAX_ASSISTANT_LIVE_S3_BUCKET }}
          TAX_ASSISTANT_LIVE_S3_PREFIX: ${{ secrets.TAX_ASSISTANT_LIVE_S3_PREFIX }}
          TAX_ASSISTANT_LIVE_S3_ENDPOINT_URL: ${{ secrets.TAX_ASSISTANT_LIVE_S3_ENDPOINT_URL }}
          TAX_ASSISTANT_LIVE_S3_REGION: ${{ secrets.TAX_ASSISTANT_LIVE_S3_REGION }}
          TAX_ASSISTANT_LIVE_S3_ACCESS_KEY_ID: ${{ secrets.TAX_ASSISTANT_LIVE_S3_ACCESS_KEY_ID }}
          TAX_ASSISTANT_LIVE_S3_SECRET_ACCESS_KEY: ${{ secrets.TAX_ASSISTANT_LIVE_S3_SECRET_ACCESS_KEY }}
        run: |
          python run_tests.py tests/test_s3_integration_live.py
