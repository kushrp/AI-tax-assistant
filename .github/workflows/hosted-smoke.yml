name: Hosted Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Hosted base URL (Railway domain or Vercel origin).
        required: true
        type: string
      api_base_url:
        description: Optional API origin when UI and API are split.
        required: false
        type: string
  schedule:
    - cron: "0 13 * * 1"

jobs:
  hosted-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || secrets.TAX_ASSISTANT_SMOKE_BASE_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run hosted smoke
        env:
          SMOKE_BASE_URL: ${{ github.event.inputs.base_url || secrets.TAX_ASSISTANT_SMOKE_BASE_URL }}
          SMOKE_API_BASE_URL: ${{ github.event.inputs.api_base_url || secrets.TAX_ASSISTANT_SMOKE_API_BASE_URL }}
        run: |
          python scripts/hosted_smoke.py \
            --base-url "$SMOKE_BASE_URL" \
            ${SMOKE_API_BASE_URL:+--api-base-url "$SMOKE_API_BASE_URL"}
